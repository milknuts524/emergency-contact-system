<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#c91f1f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name() }}">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="{{ app_icon_path() }}">
    <link rel="apple-touch-icon" href="{{ app_icon_path() }}">
    <title>通知グループ編集</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f4f6f8;
            color: #1f2933;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
            font-size: 18px;
            line-height: 1.5;
        }
        main {
            max-width: 720px;
            margin: 0 auto;
        }
        .card {
            margin-bottom: 18px;
            padding: 18px;
            border: 2px solid #d7dde5;
            border-radius: 14px;
            background: #ffffff;
        }
        .member-name {
            margin: 0 0 4px;
            font-size: 26px;
            font-weight: 800;
        }
        .member-meta {
            margin: 0;
            color: #52606d;
            font-weight: 700;
        }
        .group-option {
            display: block;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ccd5df;
            border-radius: 8px;
            background: #ffffff;
            font-weight: 800;
        }
        .group-option input {
            width: 22px;
            height: 22px;
            margin-right: 8px;
            vertical-align: middle;
        }
        button,
        .back-link {
            display: inline-block;
            min-height: 46px;
            padding: 10px 14px;
            border: 0;
            border-radius: 8px;
            background: #1f4f82;
            color: #ffffff;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }
        .back-link {
            background: #666;
        }
    </style>
</head>
<body>
    <main>
        <h1>通知グループ編集</h1>

        <section class="card">
            <p class="member-name">{{ member["name"] }}</p>
            <p class="member-meta">職種: {{ member["group_name"] or "未設定" }}</p>
        </section>

        <form class="card" method="post" action="/admin/member/{{ member['id'] }}/groups">
            <h2>所属グループ</h2>
            <p>「全員」は自動対象のため、ここでは設定不要です。</p>

            {% for group in groups %}
                <label class="group-option">
                    <input
                        type="checkbox"
                        name="group_ids"
                        value="{{ group['id'] }}"
                        {% if group['id'] in selected_group_ids %}checked{% endif %}
                    >
                    {{ group["name"] }}
                </label>
            {% endfor %}

            <button type="submit">保存</button>
        </form>

        <a class="back-link" href="/admin">管理画面へ戻る</a>
    </main>
</body>
</html>
