<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#c91f1f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Emergency">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <title>緊急連絡システム</title>
</head>
<body>
    <h1>緊急連絡システム</h1>
    <h2>初回登録</h2>

    {% if request.query_params.get("error") == "wrong_password" %}
    <p style="color: red;">初回登録パスワードが違います。</p>
    {% endif %}

    <form method="post" action="/register">
        <p>
            名前<br>
            <input type="text" name="name" required>
        </p>

        <p>
            グループ<br>
            <input type="text" name="group_name" value="家族">
        </p>

        <p>
            識別コード（自動生成）<br>
            識別コードは自動で作成されます
        </p>

        <p>
            初回登録パスワード<br>
            <input type="password" name="registration_password" required>
        </p>

        <button type="submit">登録する</button>
    </form>

    <p>管理画面：<a href="/admin">/admin</a></p>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/service-worker.js");
            });
        }
    </script>
</body>
</html>
