<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>緊急連絡システム</title>
</head>
<body>
    <h1>緊急連絡システム</h1>
    <h2>初回登録</h2>

    {% if request.query_params.get("error") == "wrong_password" %}
    <p style="color: red;">初回登録パスワードが違います。</p>
    {% endif %}

    <form method="post" action="/register">
        <p>
            名前<br>
            <input type="text" name="name" required>
        </p>

        <p>
            グループ<br>
            <input type="text" name="group_name" value="家族">
        </p>

        <p>
            自分用コード<br>
            <input type="text" name="code" required>
        </p>

        <p>
            初回登録パスワード<br>
            <input type="password" name="registration_password" required>
        </p>

        <button type="submit">登録する</button>
    </form>

    <p>管理画面：<a href="/admin">/admin</a></p>
</body>
</html>
