<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#c91f1f">
    <title>メンテナンス中</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f4f6f8;
            color: #1f2933;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
            font-size: 18px;
            line-height: 1.6;
        }

        main {
            width: 100%;
            max-width: 560px;
            padding: 24px;
            border: 2px solid #d7dde5;
            border-radius: 14px;
            background: #ffffff;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 30px;
            line-height: 1.25;
        }

        p {
            margin: 10px 0 0;
            color: #52606d;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>ただいまメンテナンス中です</h1>
        <p>しばらくしてから、もう一度お試しください。</p>
    </main>
</body>
</html>
