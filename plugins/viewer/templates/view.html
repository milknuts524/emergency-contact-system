<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ item["title"] }}</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f4f6f8; color: #1f2933; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 18px; }
        main { max-width: 980px; margin: 0 auto; padding: 16px; }
        .topbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        h1 { margin: 0; font-size: 28px; }
        .button { display: inline-flex; align-items: center; min-height: 44px; padding: 0 14px; border-radius: 8px; background: #1f4f82; color: #fff; font-weight: bold; text-decoration: none; }
        .open-file-button { width: 100%; justify-content: center; min-height: 58px; margin-bottom: 12px; font-size: 20px; }
        .description { margin: 0 0 12px; color: #52606d; font-weight: 700; }
        img { display: block; width: 100%; height: auto; border-radius: 10px; background: #fff; }
        iframe, object, embed { width: 100%; height: 82vh; border: 0; border-radius: 10px; background: #fff; }
    </style>
</head>
<body>
    <main>
        <div class="topbar">
            <h1>{{ item["title"] }}</h1>
            <a class="button" href="javascript:history.back()">戻る</a>
        </div>
        {% if item["description"] %}
            <p class="description">{{ item["description"] }}</p>
        {% endif %}
        {% if item["file_type"] == "image" %}
            <a class="button open-file-button" href="{{ file_url }}" target="_blank" rel="noopener">画像を表示</a>
            <img src="{{ file_url }}" alt="{{ item['title'] }}">
        {% else %}
            <a class="button open-file-button" href="{{ file_url }}" target="_blank" rel="noopener">PDFを開く</a>
            <iframe src="{{ file_url }}" title="{{ item['title'] }}"></iframe>
        {% endif %}
    </main>
</body>
</html>
